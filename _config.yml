title: Arcane Labs
tagline: Privacy-first, local-first software
description: >
  Arcane Labs is an independent software studio building privacy-first,
  local-first applications and developer tools. Your data stays yours.
  The best features don't need a server. Complexity belongs in the
  architecture, not in the user's face.

url: "https://arcanelabs.info"
baseurl: ""

author:
  name: Arcane Labs
  email: hello@arcanelabs.info
  url: https://arcanelabs.info
  github: arcanelabsio

# Vendor / organization — surfaced by jekyll-seo-tag as JSON-LD Organization.
organization:
  name: Arcane Labs
  url: https://github.com/arcanelabsio
  email: hello@arcanelabs.info

# Social — consumed by jekyll-seo-tag for Twitter/OG cards.
twitter:
  username: arcanelabsio
  card: summary_large_image

social:
  name: Arcane Labs
  links:
    - https://github.com/arcanelabsio
    - https://arcanelabs.info

repository: arcanelabsio/arcanelabs.info

# No pre-built theme — independent minimalist design system.
theme: null

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata
  - jekyll-feed
  - jekyll-redirect-from

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM
  hard_wrap: false

permalink: pretty

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .jekyll-cache

# Top nav links.
nav:
  - title: Projects
    url: /#projects
  - title: GitHub
    url: https://github.com/arcanelabsio
    external: true
  - title: Contact
    url: /contact/
