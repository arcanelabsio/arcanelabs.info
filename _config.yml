title: Arcane Labs
tagline: Intelligent tools that run on your own infrastructure
description: >
  Arcane Labs is an independent software studio. We build intelligent systems
  on top of user-owned storage — structured data layers, sync protocols, and
  AI that runs in your own session. No servers in between.

url: "https://arcanelabs.info"
baseurl: ""

author:
  name: Arcane Labs
  email: apps@arcanelabs.info
  url: https://arcanelabs.info
  github: arcanelabsio

# Vendor / organization — surfaced by jekyll-seo-tag as JSON-LD Organization.
organization:
  name: Arcane Labs
  url: https://github.com/arcanelabsio
  email: apps@arcanelabs.info

# Social — consumed by jekyll-seo-tag for Twitter/OG cards.
twitter:
  username: arcanelabsio
  card: summary_large_image

social:
  name: Arcane Labs
  links:
    - https://github.com/arcanelabsio
    - https://arcanelabs.info

repository: arcanelabsio/arcanelabs.info

# No pre-built theme — independent minimalist design system.
theme: null

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata
  - jekyll-feed
  - jekyll-redirect-from

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM
  hard_wrap: false

permalink: pretty

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .jekyll-cache

# Top nav links.
nav:
  - title: Products
    url: /products/
  - title: Open Source
    url: https://github.com/arcanelabsio
    external: true
  - title: Contact
    url: /contact/
