title: Arcane Labs
tagline: Software built for reuse — a solo builder's portfolio
description: >
  Arcane Labs is where Ajit Gunturi publishes software that graduates past
  ideation. Small tools, libraries, and apps built around one principle:
  solve common problems with the minimum complexity needed and the maximum
  flexibility to adapt.

url: "https://arcanelabs.info"
baseurl: ""

author:
  name: Arcane Labs
  email: hello@arcanelabs.info
  url: https://arcanelabs.info
  github: arcanelabsio

# Vendor / organization — surfaced by jekyll-seo-tag as JSON-LD Organization.
organization:
  name: Arcane Labs
  url: https://github.com/arcanelabsio
  email: hello@arcanelabs.info

# Social — consumed by jekyll-seo-tag for Twitter/OG cards.
twitter:
  username: arcanelabsio
  card: summary_large_image

social:
  name: Arcane Labs
  links:
    - https://github.com/arcanelabsio
    - https://arcanelabs.info

repository: arcanelabsio/arcanelabs.info

# No pre-built theme — independent minimalist design system.
theme: null

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata
  - jekyll-feed
  - jekyll-redirect-from

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM
  hard_wrap: false

permalink: pretty

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .jekyll-cache

# Top nav links.
nav:
  - title: Projects
    url: /#projects
  - title: GitHub
    url: https://github.com/arcanelabsio
    external: true
  - title: Contact
    url: /contact/
