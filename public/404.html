<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>arcanelabs.info</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#080b10" />
    <script>
      // SPA fallback for GitHub Pages.
      // GH Pages has no server-side rewrites, so deep-linked SPA
      // routes (e.g. /writing/my-post) fall through to 404.html.
      // Stash the requested path in sessionStorage and send the
      // browser to `/` — `src/entry-client.tsx` replays it into
      // history before the router mounts.
      (function () {
        try {
          sessionStorage.setItem(
            "spa-redirect-path",
            location.pathname + location.search + location.hash
          );
        } catch (_) {}
        location.replace("/");
      })();
    </script>
  </head>
  <body>
    <noscript>
      <p>
        <a href="/">Return to arcanelabs.info</a>
      </p>
    </noscript>
  </body>
</html>
