<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fdfaf3" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#14110d" media="(prefers-color-scheme: dark)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/editorial.css' | relative_url }}">
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('arcanelabs-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
  {% seo %}
</head>
<body class="editorial">
  <div class="lh">
    <div class="lh__page">
      {% include editorial-nav.html %}
      <main>
        {{ content }}
      </main>
      {% include editorial-footer.html %}
    </div>
  </div>
  <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
</body>
</html>
