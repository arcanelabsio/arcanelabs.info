{% assign p = page.url %}
<nav class="lh__nav" aria-label="Primary">
  <div class="lh__nav-links">
    <a href="{{ '/' | relative_url }}"{% if p == '/' %} class="is-current"{% endif %}>Home</a>
    <span class="dot">·</span>
    <a href="{{ '/writing/' | relative_url }}"{% if p contains '/writing' %} class="is-current"{% endif %}>Writing</a>
    <span class="dot">·</span>
    <a href="{{ '/company/' | relative_url }}"{% if p contains '/company' %} class="is-current"{% endif %}>Company</a>
    <span class="dot">·</span>
    <a href="{{ '/contact/' | relative_url }}"{% if p contains '/contact' %} class="is-current"{% endif %}>Contact</a>
  </div>
  <button type="button" class="lh__theme-toggle" data-theme-toggle aria-pressed="false" aria-label="Toggle dark mode">
    <svg class="icon-moon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M13.5 9.5a5.5 5.5 0 11-7-7 4.5 4.5 0 007 7z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>

    <span data-theme-label>Dark</span>
